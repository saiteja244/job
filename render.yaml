services:
  - type: web
    name: ai-career-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: GEMINI_MODEL
        value: "gemini-flash-lite-latest"
